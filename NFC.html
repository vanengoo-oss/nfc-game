<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFC 联机对战</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:linear-gradient(135deg,#0a0a0a 0%,#1a1a2e 50%,#16213e 100%);min-height:100vh;color:white;overflow-x:hidden}
        .container{max-width:1200px;margin:0 auto;padding:10px}
        .lobby-screen{text-align:center;padding:40px 20px;max-width:600px;margin:0 auto}
        .game-title{font-size:2.5em;margin-bottom:10px;background:linear-gradient(to right,#00d4ff,#f39c12,#e74c3c);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .player-setup{background:rgba(255,255,255,0.05);border-radius:20px;padding:30px;margin:30px 0;border:2px solid rgba(255,255,255,0.1)}
        .setup-row{margin:20px 0;display:flex;align-items:center;justify-content:center;gap:15px;flex-wrap:wrap}
        .setup-label{font-size:1.1em;min-width:100px;text-align:right}
        .player-counter{display:flex;align-items:center;gap:15px;background:rgba(0,0,0,0.3);padding:10px 20px;border-radius:30px}
        .counter-btn{width:40px;height:40px;border-radius:50%;border:none;background:#00d4ff;color:white;font-size:1.5em;cursor:pointer}
        .counter-value{font-size:1.5em;font-weight:bold;min-width:30px}
        .mode-selector{display:flex;gap:15px;justify-content:center;flex-wrap:wrap}
        .mode-option{padding:20px 30px;border:3px solid;border-radius:15px;cursor:pointer;transition:all 0.3s;min-width:150px}
        .mode-option.pve{border-color:#2ecc71;color:#2ecc71}
        .mode-option.pvp{border-color:#e74c3c;color:#e74c3c}
        .mode-option.selected{background:currentColor;color:white}
        .start-btn{background:linear-gradient(45deg,#f39c12,#e74c3c);border:none;padding:20px 60px;font-size:1.3em;color:white;border-radius:30px;cursor:pointer;margin-top:30px;font-weight:bold}
        .start-btn:disabled{background:#555;cursor:not-allowed}
        .room-info{background:rgba(0,212,255,0.1);border:2px solid #00d4ff;border-radius:15px;padding:20px;margin:20px 0}
        .room-code{font-size:2em;font-family:monospace;color:#f39c12;letter-spacing:5px;margin:10px 0}
        .player-list{display:flex;gap:15px;justify-content:center;margin:20px 0;flex-wrap:wrap}
        .player-badge{background:rgba(255,255,255,0.1);padding:15px 25px;border-radius:20px;border:2px solid transparent}
        .player-badge.ready{border-color:#2ecc71;box-shadow:0 0 20px rgba(46,204,113,0.3)}
        .ready-btn{background:#2ecc71;border:none;padding:10px 30px;border-radius:20px;color:white;cursor:pointer;margin-top:20px}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div class="container">
        <div class="lobby-screen" id="lobbyScreen">
            <h1 class="game-title">🏆 NFC 联机对战</h1>
            <p style="opacity:0.8;margin-bottom:30px">实体卡牌 × 联机对战</p>
            <div class="player-setup">
                <div class="setup-row">
                    <span class="setup-label">游戏人数:</span>
                    <div class="player-counter">
                        <button class="counter-btn" onclick="changeCount(-1)">−</button>
                        <span class="counter-value" id="playerCount">2</span>
                        <button class="counter-btn" onclick="changeCount(1)">+</button>
                    </div>
                    <span style="font-size:0.9em;opacity:0.7">(2-4人)</span>
                </div>
                <div class="setup-row">
                    <span class="setup-label">游戏模式:</span>
                    <div class="mode-selector">
                        <div class="mode-option pve selected" onclick="selectMode('pve')" id="modePve">
                            <div style="font-size:2em">👹</div>
                            <div style="font-weight:bold;margin:5px 0">PVE 合作</div>
                        </div>
                        <div class="mode-option pvp" onclick="selectMode('pvp')" id="modePvp">
                            <div style="font-size:2em">⚔️</div>
                            <div style="font-weight:bold;margin:5px 0">PVP 对战</div>
                        </div>
                    </div>
                </div>
                <div class="setup-row">
                    <span class="setup-label">你的名字:</span>
                    <input type="text" id="playerName" placeholder="输入名字" maxlength="8" style="padding:12px 20px;border-radius:20px;border:none;background:rgba(255,255,255,0.1);color:white;font-size:1em;width:200px">
                </div>
            </div>
            <div class="room-info hidden" id="roomSection">
                <div>房间代码</div>
                <div class="room-code" id="roomCode">WAITING</div>
                <div class="player-list" id="playerList"></div>
                <button class="ready-btn" id="readyBtn" onclick="toggleReady()">✅ 准备就绪</button>
            </div>
            <button class="start-btn" id="startBtn" onclick="createRoom()">🎮 创建房间</button>
        </div>
        <div class="game-screen hidden" id="gameScreen">
            <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:20px;margin-bottom:20px;align-items:start">
                <div class="team-panel" id="teamA" style="background:rgba(0,0,0,0.3);border-radius:15px;padding:15px;border:2px solid #00d4ff">
                    <div style="font-size:1.2em;margin-bottom:15px"><span id="teamAName">蓝队</span></div>
                    <div class="mini-players" id="teamAPlayers" style="display:flex;gap:10px;flex-wrap:wrap"></div>
                </div>
                <div style="text-align:center">
                    <div style="font-size:2.5em;font-weight:bold;color:#f39c12;text-shadow:0 0 30px #f39c12">VS</div>
                    <div style="background:rgba(0,0,0,0.5);padding:10px 20px;border-radius:20px;margin-top:10px">回合 <span id="roundNum">1</span></div>
                </div>
                <div class="team-panel" id="teamB" style="background:rgba(0,0,0,0.3);border-radius:15px;padding:15px;border:2px solid #e74c3c">
                    <div style="font-size:1.2em;margin-bottom:15px"><span id="teamBName">红队</span></div>
                    <div class="mini-players" id="teamBPlayers" style="display:flex;gap:10px;flex-wrap:wrap"></div>
                </div>
            </div>
            <div class="target-selector hidden" id="targetSelector" style="background:rgba(231,76,60,0.1);border:2px solid #e74c3c;border-radius:15px;padding:20px;margin-bottom:20px">
                <div style="font-weight:bold;margin-bottom:10px">🎯 选择攻击目标</div>
                <div class="target-list" id="targetList" style="display:flex;gap:15px;justify-content:center"></div>
            </div>
            <div style="background:rgba(255,255,255,0.05);border-radius:20px;padding:25px;margin-bottom:20px;border:2px solid rgba(243,156,18,0.3)">
                <div style="display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:20px">
                    <div id="currentAvatar" style="width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#00d4ff,#0099cc);display:flex;align-items:center;justify-content:center;font-size:2.5em;border:4px solid #f39c12">🎮</div>
                    <div>
                        <div style="font-size:1.3em;font-weight:bold" id="currentName">玩家1</div>
                        <div style="display:flex;gap:20px;margin:5px 0">
                            <span style="background:rgba(0,0,0,0.3);padding:5px 15px;border-radius:15px">❤️ <span id="currentHp">80/80</span></span>
                            <span style="background:rgba(0,0,0,0.3);padding:5px 15px;border-radius:15px">⚡ <span id="currentActions">3/3</span></span>
                        </div>
                    </div>
                </div>
                <div id="nfcZone" style="background:radial-gradient(circle,rgba(46,204,113,0.15) 0%,transparent 70%);border:3px dashed #2ecc71;border-radius:20px;padding:30px;text-align:center;margin-bottom:20px">
                    <div style="font-size:4em;margin-bottom:15px">📱</div>
                    <div style="font-size:1.2em;margin-bottom:10px">将实体NFC卡片贴近手机</div>
                    <button onclick="scanCard()" style="background:linear-gradient(45deg,#2ecc71,#27ae60);border:none;padding:18px 50px;font-size:1.2em;color:white;border-radius:30px;cursor:pointer;font-weight:bold">🔍 扫描卡片</button>
                </div>
                <div style="margin-bottom:20px">
                    <div style="font-size:1.1em;margin-bottom:15px;color:#00d4ff">🎴 手牌区域 (点击使用)</div>
                    <div id="handCards" style="display:flex;gap:15px;overflow-x:auto;padding:10px;min-height:160px">
                        <div style="width:100%;text-align:center;padding:40px;opacity:0.5">等待扫描卡片...</div>
                    </div>
                </div>
                <div style="display:flex;gap:15px;justify-content:center">
                    <button onclick="passTurn()" style="padding:15px 40px;border:none;border-radius:25px;font-size:1.1em;font-weight:bold;background:linear-gradient(45deg,#95a5a6,#7f8c8d);color:white;cursor:pointer">⏭️ 跳过</button>
                    <button onclick="endTurn()" style="padding:15px 40px;border:none;border-radius:25px;font-size:1.1em;font-weight:bold;background:linear-gradient(45deg,#e74c3c,#c0392b);color:white;cursor:pointer">✅ 结束回合</button>
                </div>
            </div>
            <div id="combatLog" style="background:rgba(0,0,0,0.4);border-radius:15px;padding:15px;max-height:200px;overflow-y:auto">
                <div style="padding:8px 12px;margin:5px 0;border-radius:8px;background:rgba(149,165,166,0.15);border-left:3px solid #95a5a6">游戏开始！等待玩家行动...</div>
            </div>
        </div>
    </div>
    <div id="comboDisplay" style="position:fixed;top:30%;left:50%;transform:translate(-50%,-50%);font-size:4em;font-weight:bold;color:#f39c12;text-shadow:0 0 40px #f39c12;pointer-events:none;opacity:0;transition:all 0.5s;z-index:100">COMBO!</div>
    <div id="gameOverModal" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.95);display:none;align-items:center;justify-content:center;flex-direction:column;z-index:2000">
        <div id="resultTitle" style="font-size:4em;margin-bottom:20px">战斗结束</div>
        <div id="resultStats" style="background:rgba(255,255,255,0.1);border-radius:20px;padding:30px;margin:20px;min-width:300px"></div>
        <button onclick="location.reload()" style="background:linear-gradient(45deg,#f39c12,#e74c3c);border:none;padding:20px 60px;font-size:1.3em;color:white;border-radius:30px;cursor:pointer;margin-top:30px;font-weight:bold">🏠 返回大厅</button>
    </div>
    <script>
        const CARD_DB={
            'NFC-001':{name:'铁剑',icon:'⚔️',tier:1,type:'attack',val:12,uses:3,cd:0},
            'NFC-002':{name:'木盾',icon:'🛡️',tier:1,type:'defense',val:10,uses:2,cd:0},
            'NFC-003':{name:'苹果',icon:'🍎',tier:1,type:'heal',val:10,uses:3,cd:0},
            'NFC-004':{name:'石子',icon:'🪨',tier:1,type:'attack',val:8,uses:5,cd:0},
            'NFC-101':{name:'火球',icon:'🔥',tier:2,type:'attack',val:22,uses:2,cd:1},
            'NFC-102':{name:'铁盾',icon:'🧱',tier:2,type:'defense',val:18,uses:2,cd:1},
            'NFC-103':{name:'药水',icon:'💚',tier:2,type:'heal',val:18,uses:2,cd:1},
            'NFC-104':{name:'毒镖',icon:'🎯',tier:2,type:'poison',val:10,uses:3,cd:0,dot:3},
            'NFC-201':{name:'圣剑',icon:'🗡️',tier:3,type:'attack',val:40,uses:2,cd:2},
            'NFC-202':{name:'圣疗',icon:'✨',tier:3,type:'heal',val:35,uses:2,cd:2},
            'NFC-203':{name:'吸血',icon:'🦇',tier:3,type:'drain',val:25,uses:2,cd:2,steal:0.6},
            'NFC-204':{name:'冰冻',icon:'❄️',tier:3,type:'control',val:20,uses:2,cd:2,stun:1},
            'NFC-301':{name:'龙焰',icon:'🐉',tier:4,type:'attack',val:70,uses:1,cd:3},
            'NFC-302':{name:'复活',icon:'🔥',tier:4,type:'revive',val:50,uses:1,cd:0},
            'NFC-303':{name:'时停',icon:'⏱️',tier:4,type:'special',val:0,uses:1,cd:4,extra:3},
            'NFC-304':{name:'核弹',icon:'💥',tier:4,type:'aoe',val:50,uses:1,cd:3}
        };
        const CONFIG={maxPlayers:4,minPlayers:2,baseHp:80,actionsPerTurn:3,pveScaling:[1,1.8,2.5,3.2],pvpTeams:{2:[[0],[1]],3:[[0,1],[2]],4:[[0,1],[2,3]]}};
        let game={mode:'pve',playerCount:2,players:[],teams:[[],[]],currentPlayer:0,round:1,enemy:null,gameOver:false,myPlayerId:0,roomCode:'',isHost:false,isLocalTest:true};
        function changeCount(d){const n=game.playerCount+d;if(n>=2&&n<=4){game.playerCount=n;document.getElementById('playerCount').textContent=n}}
        function selectMode(m){game.mode=m;document.getElementById('modePve').classList.toggle('selected',m==='pve');document.getElementById('modePvp').classList.toggle('selected',m==='pvp')}
        function createRoom(){const name=document.getElementById('playerName').value.trim()||'玩家'+Math.floor(Math.random()*1000);game.roomCode=Math.random().toString(36).substring(2,8).toUpperCase();game.isHost=true;game.myPlayerId=0;game.players=[{id:0,name:name,ready:false,isHost:true}];document.getElementById('roomCode').textContent=game.roomCode;document.getElementById('roomSection').classList.remove('hidden');document.getElementById('startBtn').classList.add('hidden');updateList();log('房间已创建: '+game.roomCode);setTimeout(()=>{for(let i=1;i<game.playerCount;i++){game.players.push({id:i,name:'玩家'+(i+1),ready:true,isHost:false})}updateList()},1000)}
        function updateList(){document.getElementById('playerList').innerHTML=game.players.map(p=>`<div class="player-badge ${p.ready?'ready':''} ${p.isHost?'host':''}"><div style="font-weight:bold">${p.name}</div><div style="font-size:0.8em;margin-top:5px">${p.ready?'✅ 准备':'⏳ 等待'}</div></div>`).join('')}
        function toggleReady(){const me=game.players.find(p=>p.id===game.myPlayerId);me.ready=!me.ready;updateList();if(me.ready&&game.isHost&&game.players.every(p=>p.ready))setTimeout(startGame,1000)}
        function log(m,t='system'){const d=document.getElementById('combatLog');const e=document.createElement('div');e.style.cssText='padding:8px 12px;margin:5px 0;border-radius:8px;background:rgba(149,165,166,0.15);border-left:3px solid #95a5a6';e.textContent='['+new Date().toLocaleTimeString()+'] '+m;d.insertBefore(e,d.firstChild);while(d.children.length>20)d.removeChild(d.lastChild)}
        function startGame(){document.getElementById('lobbyScreen').style.display='none';document.getElementById('gameScreen').classList.remove('hidden');game.players=game.players.map((p,i)=>({...p,maxHp:CONFIG.baseHp,hp:CONFIG.baseHp,hand:[],usedThisTurn:0,maxUsePerTurn:CONFIG.actionsPerTurn,combo:0,lastCardType:null,dead:false,hasRevive:false,pendingDefense:0,team:0}));if(game.mode==='pvp'){const tc=CONFIG.pvpTeams[game.playerCount];game.teams=tc;game.players.forEach((p,i)=>{p.team=tc[0].includes(i)?0:1});document.getElementById('teamAName').textContent='蓝队';document.getElementById('teamBName').textContent='红队'}else{game.players.forEach(p=>p.team=0);game.teams=[game.players.map(p=>p.id),[]];document.getElementById('teamAName').textContent='冒险者';document.getElementById('teamBName').textContent='Boss';const sc=CONFIG.pveScaling[game.playerCount-1];game.enemy={name:'深渊魔王',icon:'👹',maxHp:Math.floor(200*sc),hp:Math.floor(200*sc),atkMin:Math.floor(15*sc),atkMax:Math.floor(25*sc),nextAttack:2,poison:0,stunned:0}}updateTeam();startTurn(0);log('游戏开始！'+game.mode.toUpperCase()+'模式')}
        function updateTeam(){const ga=(p,i)=>{const c=i===game.currentPlayer;const h=Math.floor((p.hp/p.maxHp)*100);return`<div id="mini-${p.id}" style="background:rgba(255,255,255,0.1);border-radius:10px;padding:10px;min-width:80px;text-align:center;border:2px solid ${c?'#f39c12':'transparent'};${c?'box-shadow:0 0 15px rgba(243,156,18,0.4)':''};${p.dead?'opacity:0.4;filter:grayscale(1)':''}"><div style="font-size:1.5em">${p.id===game.myPlayerId?'🎮':'👤'}</div><div style="font-size:0.8em;font-weight:bold">${p.name}</div><div style="background:rgba(0,0,0,0.5);height:6px;border-radius:3px;margin-top:5px;overflow:hidden"><div style="height:100%;width:${h}%;background:${p.team===0?'#00d4ff':'#e74c3c'}"></div></div></div>`};if(game.mode==='pvp'){document.getElementById('teamAPlayers').innerHTML=game.players.filter(p=>p.team===0).map(ga).join('');document.getElementById('teamBPlayers').innerHTML=game.players.filter(p=>p.team===1).map(ga).join('')}else{document.getElementById('teamAPlayers').innerHTML=game.players.map(ga).join('');const eh=Math.floor((game.enemy.hp/game.enemy.maxHp)*100);document.getElementById('teamBPlayers').innerHTML=`<div style="background:rgba(255,255,255,0.1);border-radius:10px;padding:10px;min-width:80px;text-align:center"><div style="font-size:2em">${game.enemy.icon}</div><div style="font-size:0.8em">${game.enemy.name}</div><div style="background:rgba(0,0,0,0.5);height:6px;border-radius:3px;margin-top:5px;overflow:hidden"><div style="height:100%;width:${eh}%;background:#e74c3c"></div></div></div>`}}
        function startTurn(i){game.currentPlayer=i;const p=game.players[i];p.usedThisTurn=0;p.maxUsePerTurn=CONFIG.actionsPerTurn;p.combo=0;p.lastCardType=null;p.hand.forEach(c=>{if(c.currentCd>0)c.currentCd--});updateTeam();updateCurrent();updateHand();log('▶️ 轮到 '+p.name+' 行动');const isMy=game.myPlayerId===i;document.querySelectorAll('#gameScreen button').forEach(b=>{if(!b.onclick.toString().includes('scanCard')&&!b.onclick.toString().includes('passTurn')&&!b.onclick.toString().includes('endTurn'))return;b.disabled=!isMy||p.dead})}
        function updateCurrent(){const p=game.players[game.currentPlayer];document.getElementById('currentAvatar').textContent=p.id===game.myPlayerId?'🎮':'👤';document.getElementById('currentName').textContent=p.name+(p.id===game.myPlayerId?' (你)':'');document.getElementById('currentHp').textContent=p.hp+'/'+p.maxHp;document.getElementById('currentActions').textContent=(p.maxUsePerTurn-p.usedThisTurn)+'/'+p.maxUsePerTurn}
        function updateHand(){const p=game.players[game.currentPlayer];const c=document.getElementById('handCards');if(p.hand.length===0){c.innerHTML='<div style="width:100%;text-align:center;padding:40px;opacity:0.5">等待扫描卡片...</div>';return}const isMy=game.myPlayerId===game.currentPlayer;c.innerHTML=p.hand.map(card=>{const usable=isMy&&!p.dead&&card.uses>0&&card.currentCd===0&&p.usedThisTurn<p.maxUsePerTurn;return`<div onclick="${usable?`useCard(${card.uid})`:''}" style="min-width:120px;height:150px;border-radius:15px;padding:15px;display:flex;flex-direction:column;align-items:center;justify-content:space-between;cursor:${usable?'pointer':'not-allowed'};transition:all 0.3s;border:3px solid ${['#95a5a6','#3498db','#9b59b6','#f1c40f'][card.tier-1]};background:linear-gradient(135deg,rgba(255,255,255,0.1),rgba(255,255,255,0.05));${!usable?'opacity:0.3;filter:grayscale(1)':''};${card.tier===4?'box-shadow:0 0 20px rgba(241,196,15,0.4)':''};position:relative"><div style="font-size:2.5em">${card.icon}</div><div style="font-size:0.9em;font-weight:bold;text-align:center">${card.name}</div><div style="font-size:0.75em;background:rgba(0,0,0,0.3);padding:3px 10px;border-radius:10px">${card.type.toUpperCase()}</div>${card.uses>1?`<div style="position:absolute;top:-8px;right:-8px;background:#e74c3c;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:0.85em">${card.uses}</div>`:''}${card.currentCd>0?`<div style="position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:2em;font-weight:bold;color:#e74c3c">${card.currentCd}</div>`:''}</div>`}).join('')}
        function scanCard(){if(game.gameOver)return;const p=game.players[game.currentPlayer];if(game.myPlayerId!==game.currentPlayer&&!game.isLocalTest){log('现在不是你的回合','system');return}if(p.dead){log('你已阵亡','system');return}if(p.usedThisTurn>=p.maxUsePerTurn){log('行动次数用完','system');return}const ids=Object.keys(CARD_DB);const id=ids[Math.floor(Math.random()*ids.length)];const card=CARD_DB[id];if(!card){log('未知卡片','system');return}const ex=p.hand.find(c=>c.id===id&&c.uses>0);if(ex){ex.uses+=card.uses;log(p.name+' 获得 '+card.name+' x'+card.uses,'system')}else{const nc={...card,id:id,uid:Date.now()+Math.random(),currentCd:0};p.hand.push(nc);log(p.name+' 获得 ['+['普通','稀有','史诗','传说'][card.tier-1]+'] '+card.name,'system')}if(card.type==='revive')p.hasRevive=true;if(navigator.vibrate)navigator.vibrate(100);updateHand();updateCurrent()}
        function useCard(uid){if(game.gameOver)return;if(game.myPlayerId!==game.currentPlayer&&!game.isLocalTest)return;const p=game.players[game.currentPlayer];const card=p.hand.find(c=>c.uid===uid);if(!card||card.uses<=0)return;if(card.currentCd>0){log(card.name+' 冷却中','system');return}if(p.usedThisTurn>=p.maxUsePerTurn){log('行动次数不足','system');return}if(game.mode==='pvp'&&card.type==='attack'){showTargets(uid);return}execute(card,null)}
        function showTargets(uid){const ts=document.getElementById('targetSelector');const tl=document.getElementById('targetList');const p=game.players[game.currentPlayer];const et=p.team===0?1:0;const targets=game.players.filter(t=>t.team===et&&!t.dead);tl.innerHTML=targets.map(t=>`<div onclick="selectTarget(${uid},${t.id})" style="background:rgba(255,255,255,0.1);border:3px solid transparent;border-radius:15px;padding:15px 25px;cursor:pointer;text-align:center"><div style="font-size:2em">👤</div><div>${t.name}</div><div style="font-size:0.8em;opacity:0.8">${t.hp}/${t.maxHp} HP</div></div>`).join('');ts.classList.remove('hidden')}
        function selectTarget(uid,tid){document.getElementById('targetSelector').classList.add('hidden');const p=game.players[game.currentPlayer];const card=p.hand.find(c=>c.uid===uid);execute(card,tid)}
        function execute(card,tid){const p=game.players[game.currentPlayer];const bonus=1+(p.combo*0.2);card.uses--;p.usedThisTurn++;if(card.cd>0&&card.uses>0)card.currentCd=card.cd;switch(card.type){case'attack':const dmg=Math.floor(card.val*bonus*(0.9+Math.random()*0.2));if(game.mode==='pvp'&&tid!==null){damage(tid,dmg);showFloat('-'+dmg,tid)}else{game.enemy.hp-=dmg;showFloat('-'+dmg,'enemy');log(p.name+' 对Boss造成 '+dmg+' 伤害','system')}break;case'aoe':const aoe=Math.floor(card.val*bonus);if(game.mode==='pvp'){const et=p.team===0?1:0;game.players.forEach(t=>{if(t.team===et&&!t.dead){damage(t.id,aoe);showFloat('-'+aoe,t.id)}});log(p.name+' 发动全体攻击 '+aoe,'system')}else{game.enemy.hp-=aoe;showFloat('-'+aoe,'enemy');log(p.name+' AOE伤害 '+aoe,'system')}break;case'heal':const heal=card.val;const target=tid!==null?game.players[tid]:p;const ah=Math.min(heal,target.maxHp-target.hp);target.hp+=ah;if(ah>0)showFloat('+'+ah,target.id);log(p.name+' 治疗 '+target.name+' '+ah,'system');break;case'defense':p.pendingDefense+=card.val;log(p.name+' 准备格挡 '+card.val,'system');break;case'drain':const drain=Math.floor(card.val*bonus);const dh=Math.floor(drain*card.steal);if(game.mode==='pvp'&&tid!==null){damage(tid,drain);p.hp=Math.min(p.maxHp,p.hp+dh);showFloat('-'+drain,tid);setTimeout(()=>showFloat('+'+dh,p.id),200)}else{game.enemy.hp-=drain;p.hp=Math.min(p.maxHp,p.hp+dh);showFloat('-'+drain,'enemy');setTimeout(()=>showFloat('+'+dh,p.id),200)}log(p.name+' 吸血 '+drain+' 回复 '+dh,'system');break;case'poison':const pd=card.val;if(game.mode==='pvp'&&tid!==null){damage(tid,pd);showFloat('-'+pd+'毒',tid)}else{game.enemy.hp-=pd;game.enemy.poison=(game.enemy.poison||0)+card.dot;showFloat('-'+pd+'毒','enemy');log(p.name+' 使Boss中毒','system')}break;case'control':const cd=card.val;if(game.mode==='pvp'&&tid!==null){damage(tid,cd);game.players[tid].stunned=true;showFloat('晕眩!',tid)}else{game.enemy.hp-=cd;game.enemy.stunned=card.stun;showFloat('晕眩!','enemy')}log(p.name+' 晕眩目标','system');break;case'revive':p.hasRevive=true;log(p.name+' 装备复活','system');break;case'special':if(card.extra){p.maxUsePerTurn+=card.extra;log(p.name+' 额外行动+'+card.extra,'system')}break}if(p.lastCardType===card.type){p.combo++;document.getElementById('comboDisplay').textContent='COMBO x'+(p.combo+1)+'!';document.getElementById('comboDisplay').style.opacity=1;setTimeout(()=>document.getElementById('comboDisplay').style.opacity=0,1500);if(navigator.vibrate)navigator.vibrate([50,50,50])}else{p.combo=0}p.lastCardType=card.type;if(card.uses<=0)setTimeout(()=>{p.hand=p.hand.filter(c=>c.uid!==card.uid);updateHand()},300);updateTeam();updateCurrent();checkWin()}
        function damage(pid,dmg){const p=game.players[pid];if(p.pendingDefense>0){const b=Math.min(dmg,p.pendingDefense);dmg-=b;p.pendingDefense-=b}p.hp-=dmg;if(p.hp<=0){p.hp=0;if(p.hasRevive){p.hp=Math.floor(p.maxHp*0.4);p.hasRevive=false;p.hand=p.hand.filter(c=>c.type!=='revive');log(p.name+' 复活!','system');showFloat('复活!',pid)}else{p.dead=true;log(p.name+' 被击败!','system')}}}
        function showFloat(t,tr){const d=document.createElement('div');d.textContent=t;d.style.cssText='position:fixed;font-size:3em;font-weight:bold;pointer-events:none;z-index:1000;animation:floatUp 1s ease-out forwards;text-shadow:0 0 20px currentColor;color:'+(t.includes('+')?'#2ecc71':(tr==='enemy'?'#f1c40f':'#e74c3c'));if(tr==='enemy'){d.style.left='50%';d.style.top='20%'}else{const s=document.getElementById('mini-'+tr);if(s){const r=s.getBoundingClientRect();d.style.left=r.left+r.width/2+'px';d.style.top=r.top+'px'}}document.body.appendChild(d);setTimeout(()=>d.remove(),1000)}
        function passTurn(){nextPlayer()}function endTurn(){if(game.mode==='pve'){const next=getNext(game.currentPlayer);if(next<=game.currentPlayer){enemyTurn()}else{startTurn(next)}}else{nextPlayer()}}function nextPlayer(){const next=getNext(game.currentPlayer);if(next===-1){checkWin();return}startTurn(next)}function getNext(cur){for(let i=1;i<=game.players.length;i++){const idx=(cur+i)%game.players.length;if(!game.players[idx].dead)return idx}return-1}
        function enemyTurn(){if(game.gameOver)return;log('--- '+game.enemy.name+' 的回合 ---','system');if(game.enemy.stunned>0){game.enemy.stunned--;log('Boss晕眩中','system');setTimeout(()=>startTurn(0),1500);return}if(game.enemy.poison>0){game.enemy.hp-=5;game.enemy.poison--;log('Boss中毒 -5','system')}if(game.enemy.hp<=0){win();return}game.enemy.nextAttack--;if(game.enemy.nextAttack<=0){const alive=game.players.filter(p=>!p.dead);const t=alive[Math.floor(Math.random()*alive.length)];const dmg=Math.floor(game.enemy.atkMin+Math.random()*(game.enemy.atkMax-game.enemy.atkMin));if(Math.random()<0.3&&alive.length>1){const aoe=Math.floor(dmg*0.7);alive.forEach(p=>{damage(p.id,aoe);showFloat('-'+aoe,p.id)});log('Boss全体攻击 '+aoe,'system')}else{damage(t.id,dmg);showFloat('-'+dmg,t.id);log('Boss对 '+t.name+' 造成 '+dmg,'system')}game.enemy.nextAttack=2}else{log('Boss蓄力中...','system')}if(game.players.filter(p=>!p.dead).length===0){lose();return}setTimeout(()=>{game.round++;document.getElementById('roundNum').textContent=game.round;startTurn(0)},2000)}
        function checkWin(){if(game.mode==='pve'){if(game.enemy.hp<=0)win()}else{const t0=game.players.filter(p=>p.team===0&&!p.dead).length;const t1=game.players.filter(p=>p.team===1&&!p.dead).length;if(t0===0)over(1);else if(t1===0)over(0)}}function win(){game.gameOver=true;showOver('🏆 胜利!','green')}function lose(){game.gameOver=true;showOver('💀 失败','red')}function over(wt){game.gameOver=true;const myTeam=game.players[game.myPlayerId].team;showOver(myTeam===wt?'🏆 胜利!':'💀 失败',myTeam===wt?'green':'red')}function showOver(t,c){document.getElementById('gameOverModal').style.display='flex';document.getElementById('resultTitle').textContent=t;document.getElementById('resultTitle').style.color=c==='green'?'#2ecc71':'#e74c3c';document.getElementById('resultStats').innerHTML='<div style="display:flex;justify-content:space-between;margin:10px 0"><span>回合:</span><span>'+game.round+'</span></div><div style="display:flex;justify-content:space-between;margin:10px 0"><span>存活:</span><span>'+game.players.filter(p=>!p.dead).length+'/'+game.playerCount+'</span></div>'}
    </script>
</body>
</html>
