<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFC卡牌对战</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 10px; }
        .btn {
            background: linear-gradient(45deg, #00d2ff, #3a7bd5);
            border: none;
            padding: 15px 30px;
            color: white;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px 5px;
            display: inline-block;
        }
        .btn-danger { background: linear-gradient(45deg, #ff4757, #ff6348); }
        .panel {
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
            text-align: center;
        }
        .card {
            width: 90px;
            height: 120px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 10px;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 5px;
            padding: 5px;
            font-size: 11px;
            cursor: pointer;
            border: 2px solid rgba(255,255,255,0.3);
        }
        .hp-bar {
            width: 100%;
            height: 20px;
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }
        .hp-fill {
            height: 100%;
            background: linear-gradient(90deg, #2ed573, #7bed9f);
            transition: width 0.3s;
        }
        .boss-hp-fill { background: linear-gradient(90deg, #ff4757, #ff6348); }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔮 NFC卡牌对战</h1>
        
        <div id="menu" class="panel">
            <h2>选择游戏模式</h2>
            <button class="btn" onclick="startPVE()">👥 PVE 打Boss</button>
            <button class="btn" onclick="startPVP()">⚔️ PVP 对战</button>
        </div>

        <div id="game" class="panel hidden">
            <div style="background:rgba(255,0,0,0.2);padding:15px;border-radius:10px;margin-bottom:20px">
                <h3>👹 Boss</h3>
                <div>HP: <span id="bossHp">500</span>/500</div>
                <div class="hp-bar"><div class="hp-fill boss-hp-fill" id="bossBar" style="width:100%"></div></div>
            </div>

            <div style="background:rgba(0,255,0,0.2);padding:15px;border-radius:10px;margin-bottom:20px">
                <h3>👤 你</h3>
                <div>HP: <span id="playerHp">100</span>/100</div>
                <div class="hp-bar"><div class="hp-fill" id="playerBar" style="width:100%"></div></div>
            </div>

            <div id="hand"></div>
            
            <div style="margin-top:20px">
                <button class="btn" onclick="drawCard()">📱 扫描NFC抽卡</button>
                <button class="btn btn-danger" onclick="endTurn()">结束回合</button>
            </div>
            
            <div id="log" style="margin-top:20px;text-align:left;max-height:150px;overflow-y:auto;background:rgba(0,0,0,0.3);padding:10px;border-radius:8px"></div>
        </div>
    </div>

    <script>
        let player = { hp: 100, maxHp: 100, hand: [], defense: 0 };
        let boss = { hp: 500, maxHp: 500, damage: 20 };
        let turn = 1;
        let hasDrawn = false;

        const cards = [
            { name: '火球术', type: 'attack', value: 25, desc: '造成25伤害' },
            { name: '治疗术', type: 'heal', value: 30, desc: '恢复30生命' },
            { name: '护盾', type: 'defense', value: 20, desc: '获得20防御' },
            { name: '重击', type: 'attack', value: 40, desc: '造成40伤害' }
        ];

        function startPVE() {
            document.getElementById('menu').classList.add('hidden');
            document.getElementById('game').classList.remove('hidden');
            player.hand = [drawOne(), drawOne(), drawOne()];
            updateUI();
            log('游戏开始！你的回合');
        }

        function startPVP() {
            alert('PVP模式需要联机功能，当前为单机演示');
            startPVE();
        }

        function drawOne() {
            return {...cards[Math.floor(Math.random() * cards.length)], id: Date.now()};
        }

        function drawCard() {
            if(hasDrawn) {
                log('本回合已抽过卡！');
                return;
            }
            if(player.hand.length >= 5) {
                log('手牌已满！');
                return;
            }
            player.hand.push(drawOne());
            hasDrawn = true;
            updateUI();
            log('抽卡成功！');
        }

        function playCard(index) {
            let card = player.hand[index];
            if(!card) return;

            if(card.type === 'attack') {
                boss.hp -= card.value;
                log('你对Boss造成 ' + card.value + ' 伤害');
            } else if(card.type === 'heal') {
                player.hp = Math.min(player.maxHp, player.hp + card.value);
                log('你恢复了 ' + card.value + ' 生命');
            } else if(card.type === 'defense') {
                player.defense += card.value;
                log('你获得了 ' + card.value + ' 防御');
            }

            player.hand.splice(index, 1);
            updateUI();

            if(boss.hp <= 0) {
                setTimeout(() => alert('🎉 胜利！Boss被击败了！'), 100);
                return;
            }
        }

        function endTurn() {
            hasDrawn = false;
            setTimeout(bossTurn, 500);
        }

        function bossTurn() {
            let dmg = boss.damage;
            if(player.defense > 0) {
                let blocked = Math.min(player.defense, dmg);
                player.defense -= blocked;
                dmg -= blocked;
                log('Boss攻击被防御格挡 ' + blocked + ' 点');
            }
            player.hp -= dmg;
            log('Boss对你造成 ' + dmg + ' 伤害！');
            updateUI();

            if(player.hp <= 0) {
                setTimeout(() => alert('💀 失败...你被打败了'), 100);
            } else {
                turn++;
                log('第 ' + turn + ' 回合开始');
            }
        }

        function updateUI() {
            document.getElementById('bossHp').innerText = Math.max(0, boss.hp);
            document.getElementById('bossBar').style.width = (Math.max(0, boss.hp) / boss.maxHp * 100) + '%';
            document.getElementById('playerHp').innerText = Math.max(0, player.hp);
            document.getElementById('playerBar').style.width = (Math.max(0, player.hp) / player.maxHp * 100) + '%';
            
            let handHtml = '';
            player.hand.forEach((card, i) => {
                handHtml += `<div class="card" onclick="playCard(${i})"><b>${card.name}</b><br>${card.desc}</div>`;
            });
            document.getElementById('hand').innerHTML = handHtml;
        }

        function log(msg) {
            let div = document.getElementById('log');
            div.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`;
            div.scrollTop = div.scrollHeight;
        }
    </script>
</body>
</html>
